name: Weekly Novartis jobs digest

on:
  schedule:
    - cron: "0 8 * * 1"   # Monday 08:00 UTC
  workflow_dispatch: {}

jobs:
  weekly:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Install uv (official action)
      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      # Install deps from pyproject.toml / uv.lock
      - name: Install dependencies
        run: |
          uv sync --frozen

      # Run pipeline + send email, writing outputs to /tmp (no commits)
      - name: Run pipeline + send email (no push)
        env:
          OUTPUT_BASE_DIR: /tmp/outputs
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          uv run python main.py --send-email

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-report
          path: /tmp/outputs/**/weekly_report.html